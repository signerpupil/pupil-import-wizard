name: Tests & Report

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install --no-audit --no-fund

      - name: Run all tests (JSON reporter)
        id: tests
        continue-on-error: true
        run: npx vitest run --reporter=json --outputFile=test-results.json

      - name: Generate HTML test report
        if: always()
        run: node scripts/generate-test-report.mjs test-results.json public/test-report.html
        continue-on-error: true

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            public/test-report.html
            test-results.json

      - name: Commit updated report (main only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          if git diff --quiet public/test-report.html; then
            echo "No report changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/test-report.html
          git commit -m "ci: update test report [skip ci]"
          git push

      - name: Fail job if tests failed
        if: steps.tests.outcome == 'failure'
        run: |
          echo "Tests failed — see report artifact."
          exit 1